CONFIG_GPIO=y

CONFIG_I2C=y
CONFIG_SPI=y

CONFIG_SENSOR=y

CONFIG_ESB=y

CONFIG_I2S=y
CONFIG_LED_STRIP=y

CONFIG_FUEL_GAUGE=y
